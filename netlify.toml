[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https://js.stripe.com https://m.stripe.network https://js.stripe.network; script-src 'self' 'unsafe-inline' https://js.stripe.com https://m.stripe.network https://js.stripe.network; frame-src https://js.stripe.com https://hooks.stripe.com; connect-src 'self' https://api.stripe.com https://m.stripe.network https://js.stripe.network; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;"